<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>meshtastic-zoo · статус</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📟</text></svg>">
  <style>
    :root { --bg:#1b1b1d; --panel:#242428; --stroke:#39393d; --text:#e8e8ea; --muted:#9a9aa0;
            --green:#35c98e; --amber:#e0a03c; --red:#e0533c; --blue:#6ea8ff; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font:14px/1.5 -apple-system,system-ui,sans-serif; padding:20px; }
    a { color:var(--blue); text-decoration:none; }
    h1 { font-size:20px; font-weight:600; margin:0 0 2px; }
    .sub { color:var(--muted); font-size:12.5px; margin-bottom:18px; }
    .sub b { color:var(--text); }
    h2 { font-size:12px; letter-spacing:.05em; text-transform:uppercase; color:var(--muted); margin:22px 0 8px; }
    .card { background:var(--panel); border:1px solid var(--stroke); border-radius:10px; padding:10px 14px; margin-bottom:8px;
            display:flex; align-items:center; gap:10px; }
    .dot { width:9px; height:9px; border-radius:50%; flex:none; }
    .g{background:var(--green)} .a{background:var(--amber)} .r{background:var(--red)} .o{background:#55555c}
    .nm { font-weight:600; min-width:82px; }
    .note { color:var(--muted); flex:1; font-size:13px; }
    .age { color:var(--muted); font-size:12px; white-space:nowrap; }
    /* карточка воркера с профильным графиком: точка | имя+заметка | график */
    .wcard { align-items:stretch; flex-wrap:wrap; }
    .wcard .dot { margin-top:5px; }
    .wmain { flex:1; min-width:0; display:flex; flex-direction:column; gap:2px; }
    .wtop { display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
    .wgraph { width:158px; flex:none; align-self:center; }
    .wg-lbl { font-size:11.5px; color:var(--muted); margin-bottom:1px; text-align:right; }
    .wg-lbl b { color:var(--text); font-weight:600; }
    .wg-lbl .rate { color:var(--green); }
    @media(max-width:520px){ .wgraph { width:100%; margin-left:19px; } .wg-lbl { text-align:left; } }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:8px; }
    .tile { background:var(--panel); border:1px solid var(--stroke); border-radius:10px; padding:10px 12px; }
    .tile .v { font-size:20px; font-weight:600; }
    .tile .k { color:var(--muted); font-size:11.5px; margin-top:1px; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
    @media(max-width:560px){ .grid2 { grid-template-columns:1fr; } }
    .tile.grf .v { font-size:16px; margin-top:4px; }
    .tile .rate { color:var(--muted); font-size:11.5px; margin-top:3px; }
    .nrow { display:grid; grid-template-columns:14px 1fr auto; gap:10px; align-items:center; }
    .meta { color:var(--muted); font-size:12px; }
    .meta b { color:var(--text); font-weight:500; }
    .err { color:var(--red); }
    #upd { position:fixed; top:14px; right:18px; color:var(--muted); font-size:11.5px; }
  </style>
</head>
<body>
  <div id="upd"></div>
  <h1>meshtastic-zoo · статус</h1>
  <div class="sub" id="head">загрузка…</div>
  <h2>Загрузка канала <span class="meta" style="text-transform:none;letter-spacing:0">· 6ч · чем тише, тем чаще воркеры выходят в эфир</span></h2>
  <div id="graphs"></div>
  <h2>Воркеры <span class="meta" style="text-transform:none;letter-spacing:0">· профиль за 6ч</span></h2><div id="workers"></div>
  <h2>Свои ноды</h2><div id="nodes"></div>
  <h2>Данные</h2><div class="grid" id="data"></div>
  <div class="sub" style="margin-top:20px"><a href="index.html">← на карту</a></div>

  <script>
    const WARN = { keeper:700, writer:180, reader:180, pruner:900, trace:3600, keyfetch:1800, geocode:90000, tg:120 };
    const ORDER = ["keeper","writer","reader","pruner","trace","keyfetch","geocode","tg"];
    const LABEL = { keeper:"keeper · соединения", writer:"writer · опрос→кеш", reader:"reader · кеш→карта",
      pruner:"pruner · чистка", trace:"trace · трассировка", keyfetch:"keyfetch · ключи",
      geocode:"geocode · адреса", tg:"tg · telegram" };
    // профильная метрика воркера: столбец истории + подпись + цвет. down=«полезно вниз»
    // (keyfetch добывает ключи → keyless падает), cum=накопительный счётчик.
    const METRIC = {
      writer:   { k:"cache",       lbl:"узлов",     unit:"/ч",        color:"#35c98e" },
      reader:   { k:"live",        lbl:"на карте",  unit:"/ч",        color:"#6ea8ff" },
      trace:    { k:"traces_done", lbl:"трасс",     unit:"/ч", cum:1, color:"#b98bff" },
      keyfetch: { k:"keyless",     lbl:"без ключа", unit:"/ч добыто", color:"#e0a03c", down:1 },
    };
    let hist = [];  // последний ряд метрик (обновляет tickHist, рисует tick)
    const spanH = () => hist.length < 2 ? 0.05 : Math.max(0.05, (hist[hist.length-1].ts - hist[0].ts) / 3600);
    const fmt = (v) => v == null ? "—" : Number.isInteger(v) ? v : (+v).toFixed(1);
    // спарклайн + подпись профильной метрики воркера (или "" если данных нет)
    const workerGraph = (n) => {
      const m = METRIC[n]; if (!m || hist.length < 2) return "";
      const vals = hist.map(p => p[m.k]), clean = vals.filter(v => v != null);
      if (clean.length < 2) return "";
      const cur = clean[clean.length-1];
      let r;
      if (m.cum) {  // накопительный счётчик (обнуляется при рестарте) — сумма приростов
        r = 0; for (let i = 1; i < clean.length; i++) if (clean[i] > clean[i-1]) r += clean[i] - clean[i-1];
        r /= spanH();
      } else r = (clean[clean.length-1] - clean[0]) / spanH();
      const shown = m.down ? Math.max(0, -r) : r;      // темп в «полезную» сторону
      const rlbl = `${shown >= 0 ? "+" : ""}${shown.toFixed(1)}${m.unit}`;
      return `<div class="wgraph"><div class="wg-lbl">${m.lbl} <b>${fmt(cur)}</b> · <span class="rate">${rlbl}</span></div>
        ${spark(vals, { h:30, color:m.color })}</div>`;
    };
    const age = (s) => s == null ? "—" : s < 60 ? Math.round(s)+"с" : s < 3600 ? Math.round(s/60)+"м" :
      s < 86400 ? (s/3600).toFixed(1)+"ч" : (s/86400).toFixed(1)+"д";
    const cls = (a, w) => a == null ? "o" : a < w ? "g" : a < w*3 ? "a" : "r";
    const up = (s) => { const d=Math.floor(s/86400),h=Math.floor(s%86400/3600),m=Math.floor(s%3600/60);
      return (d?d+"д ":"")+(h?h+"ч ":"")+m+"м"; };
    const el = (id) => document.getElementById(id);

    async function tick() {
      let s;
      try { s = await (await fetch("/api/status", { cache:"no-store" })).json(); }
      catch { el("head").innerHTML = '<span class="err">хаб недоступен</span>'; return; }
      el("upd").textContent = "обновлено " + new Date().toLocaleTimeString();
      el("head").innerHTML = `uptime <b>${up(s.uptime)}</b> · канал <b>${s.chUtil == null ? "—" : s.chUtil.toFixed(1)+"%"}</b> · в кеше <b>${s.data.cacheNodes}</b> узлов`;

      // воркеры (в фиксированном порядке; неизвестные — в конце)
      const seen = new Set();
      const rows = ORDER.filter(n => s.workers[n]).map(n => { seen.add(n); return [n, s.workers[n]]; })
        .concat(Object.entries(s.workers).filter(([n]) => !seen.has(n)));
      el("workers").innerHTML = rows.map(([n, w]) =>
        `<div class="card wcard"><span class="dot ${cls(w.age, WARN[n] || 600)}"></span>
          <div class="wmain"><div class="wtop"><span class="nm">${LABEL[n] || n}</span>
            <span class="age">${age(w.age)} назад</span></div>
            <div class="note">${w.note || ""}</div></div>
          ${workerGraph(n)}</div>`).join("") || '<div class="meta">нет данных</div>';

      // свои ноды
      el("nodes").innerHTML = (s.nodes || []).map(n => {
        const parts = [];
        if (n.chUtil != null) parts.push(`канал <b>${n.chUtil.toFixed(0)}%</b>`);
        if (n.dbSize != null) parts.push(`база <b>${n.dbSize}</b>`);
        if (n.batt != null) parts.push(`🔋 <b>${n.batt}%</b>`);
        if (n.uptime != null) parts.push(`up <b>${up(n.uptime)}</b>`);
        if (n.silent != null) parts.push(`тишина ${age(n.silent)}`);
        return `<div class="card nrow"><span class="dot ${n.connected ? "g" : "r"}"></span>
          <span><span class="nm">${esc(n.name)}</span> <span class="meta">${esc(n.ip)}</span><br>
          <span class="meta">${parts.join(" · ") || (n.connected ? "на связи" : "нет связи")}</span></span>
          <span class="age">${n.connected ? "" : "off"}</span></div>`;
      }).join("") || '<div class="meta">нет подключений</div>';

      // данные
      const d = s.data, liveCls = d.liveAge == null ? "" : d.liveAge > 180 ? ' class="err"' : '';
      const tiles = [
        ["узлов на карте", d.liveNodes], ["live.json", `<span${liveCls}>${age(d.liveAge)}</span>`],
        ["в кеше", d.cacheNodes], ["прямых 3мин", d.cacheDirect3m],
        ["оценок est", d.est], ["подозр. позиций", d.posSus],
        ["подтв. трассой", d.traceNbr], ["без ключа", d.keyless],
        ["личных", d.messages], ["канал", d.channel], ["трассировок", d.traces],
      ];
      el("data").innerHTML = tiles.map(([k, v]) =>
        `<div class="tile"><div class="v">${v ?? "—"}</div><div class="k">${k}</div></div>`).join("");
    }
    function esc(s){ return String(s == null ? "" : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

    function spark(vals, o = {}) {
      const h = o.h || 40, color = o.color || "#6ea8ff", fill = o.fill !== false;
      const clean = vals.filter(v => v != null);
      if (clean.length < 2) return `<svg height="${h}" style="width:100%;height:${h}px"></svg>`;
      const mn = o.min ?? Math.min(...clean), mx = o.max ?? Math.max(...clean), rng = (mx - mn) || 1, n = vals.length, W = 300;
      let d = "", started = false;
      vals.forEach((v, i) => { if (v == null) return; const x = i / (n - 1) * W, y = h - 2 - (v - mn) / rng * (h - 6);
        d += (started ? "L" : "M") + x.toFixed(1) + " " + y.toFixed(1) + " "; started = true; });
      const area = fill ? `<path d="${d}L${W} ${h}L0 ${h}Z" fill="${color}" fill-opacity="0.13"/>` : "";
      return `<svg viewBox="0 0 ${W} ${h}" preserveAspectRatio="none" style="width:100%;height:${h}px">${area}<path d="${d}" fill="none" stroke="${color}" stroke-width="1.5"/></svg>`;
    }

    async function tickHist() {
      let hh;
      try { hh = (await (await fetch("/api/status/history?hours=6", { cache: "no-store" })).json()).series || []; }
      catch { return; }
      const wasEmpty = hist.length < 2;
      hist = hh;  // кэш для профильных графиков в карточках воркеров (их рисует tick)
      if (hh.length < 2) { el("graphs").innerHTML = '<div class="meta">график появится через несколько минут накопления</div>'; return; }
      const cur = hh.map(p => p.chutil).filter(v => v != null).slice(-1)[0];
      el("graphs").innerHTML =
        `<div class="tile grf"><div class="k">канал (chUtil %) · вход дросселя воркеров</div>
          ${spark(hh.map(p => p.chutil), { h: 60, color: "#e0a03c" })}
          <div class="v">${cur == null ? "—" : (+cur).toFixed(1)}%</div></div>`;
      if (wasEmpty) tick();  // первый приход истории — сразу дорисовать графики воркеров
    }

    tick(); tickHist();
    setInterval(tick, 5000);
    setInterval(tickHist, 30000);
  </script>
</body>
</html>
