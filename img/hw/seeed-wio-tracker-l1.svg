<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 100">
  <!-- Seeed Studio Wio Tracker L1 (E-Ink): компактный LoRa-трекер с e-ink экраном -->
  <!-- антенна -->
  <rect x="49" y="1" width="6" height="13" rx="3" fill="#3a3f47" stroke="#565c66" stroke-width="1.5"/>
  <!-- корпус -->
  <rect x="12" y="10" width="48" height="84" rx="8" fill="#2a2d33" stroke="#484d57" stroke-width="2"/>
  <!-- e-ink экран (светлый) -->
  <rect x="18" y="16" width="36" height="42" rx="2.5" fill="#e7e9e7" stroke="#9aa0a0" stroke-width="1.5"/>
  <!-- бледные строки текста на e-ink -->
  <g stroke="#b7bbbb" stroke-width="1.4" stroke-linecap="round">
    <line x1="22" y1="24" x2="50" y2="24"/>
    <line x1="22" y1="30" x2="45" y2="30"/>
    <line x1="22" y1="36" x2="50" y2="36"/>
    <line x1="22" y1="42" x2="41" y2="42"/>
    <line x1="22" y1="48" x2="47" y2="48"/>
  </g>
  <!-- кнопка -->
  <circle cx="24" cy="73" r="4.5" fill="#3a3f47" stroke="#565c66" stroke-width="1"/>
  <!-- GPS-локатор (это трекер): концентрические кольца + янтарная точка -->
  <circle cx="44" cy="73" r="6" fill="none" stroke="#565c66" stroke-width="1.4"/>
  <circle cx="44" cy="73" r="2.2" fill="#dfac52"/>
  <!-- USB-C снизу -->
  <rect x="30" y="90" width="12" height="4" rx="2" fill="#1c1e22" stroke="#484d57" stroke-width="1"/>
</svg>
