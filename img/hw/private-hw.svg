<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 78">
  <!-- Приватная/самодельная сборка (PRIVATE_HW): протоплата + замок -->
  <!-- плата -->
  <rect x="8" y="10" width="92" height="58" rx="5" fill="#33322c" stroke="#565349" stroke-width="2"/>
  <!-- сетка отверстий протоплаты -->
  <g fill="#1c1b16">
    <circle cx="20" cy="22" r="1.6"/><circle cx="28" cy="22" r="1.6"/><circle cx="36" cy="22" r="1.6"/><circle cx="44" cy="22" r="1.6"/><circle cx="52" cy="22" r="1.6"/>
    <circle cx="20" cy="30" r="1.6"/><circle cx="28" cy="30" r="1.6"/><circle cx="36" cy="30" r="1.6"/><circle cx="44" cy="30" r="1.6"/><circle cx="52" cy="30" r="1.6"/>
    <circle cx="20" cy="38" r="1.6"/><circle cx="28" cy="38" r="1.6"/><circle cx="36" cy="38" r="1.6"/><circle cx="44" cy="38" r="1.6"/><circle cx="52" cy="38" r="1.6"/>
    <circle cx="20" cy="46" r="1.6"/><circle cx="28" cy="46" r="1.6"/><circle cx="36" cy="46" r="1.6"/><circle cx="44" cy="46" r="1.6"/><circle cx="52" cy="46" r="1.6"/>
  </g>
  <!-- чип -->
  <rect x="62" y="24" width="20" height="20" rx="2" fill="#20232a" stroke="#3d4550" stroke-width="1.2"/>
  <!-- антенна -->
  <rect x="88" y="16" width="6" height="14" rx="3" fill="#3a3f47" stroke="#565c66" stroke-width="1.2"/>
  <!-- замок «приватно» -->
  <g transform="translate(66,50)">
    <path d="M3 5 v-2 a4 4 0 0 1 8 0 v2" fill="none" stroke="#c99a2e" stroke-width="1.8"/>
    <rect x="0.5" y="5" width="13" height="10" rx="2" fill="#c99a2e"/>
    <circle cx="7" cy="9.5" r="1.6" fill="#33322c"/>
  </g>
</svg>
