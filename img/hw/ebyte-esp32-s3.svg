<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 82">
  <!-- EBYTE ESP32-S3 LoRa-плата -->
  <!-- плата -->
  <rect x="8" y="10" width="92" height="62" rx="5" fill="#2c3a33" stroke="#48594f" stroke-width="2"/>
  <!-- экранированный модуль EBYTE (металлический кожух) -->
  <rect x="16" y="20" width="44" height="42" rx="2" fill="#aeb3b8" stroke="#7d838a" stroke-width="1.5"/>
  <rect x="20" y="24" width="36" height="18" rx="1.5" fill="none" stroke="#8b9097" stroke-width="1"/>
  <!-- чип-антенна (золото) + SoC -->
  <rect x="80" y="16" width="16" height="8" rx="1.5" fill="#c99a2e"/>
  <circle cx="88" cy="40" r="6" fill="#20232a" stroke="#3d4550" stroke-width="1.2"/>
  <circle cx="88" cy="40" r="2.2" fill="#454b55"/>
  <!-- контакты по бокам и снизу -->
  <g fill="#c99a2e">
    <rect x="12" y="18" width="4" height="3"/><rect x="12" y="26" width="4" height="3"/><rect x="12" y="34" width="4" height="3"/><rect x="12" y="42" width="4" height="3"/><rect x="12" y="50" width="4" height="3"/>
    <rect x="24" y="66" width="3" height="6"/><rect x="31" y="66" width="3" height="6"/><rect x="38" y="66" width="3" height="6"/><rect x="45" y="66" width="3" height="6"/>
  </g>
</svg>
