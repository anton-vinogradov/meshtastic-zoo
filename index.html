<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>meshtastic-zoo</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="chtab" title="Public channel">💬</button>
  <aside id="channel"></aside>
  <div id="mail" hidden></div>
  <button id="viewtab" title="geographic view">🗺</button>
  <button id="gear" title="settings">⚙</button>
  <aside id="settings"></aside>
  <main id="map"></main>
  <div id="mapzoom">
    <button id="mz-out" title="zoom out" aria-label="zoom out">−</button>
    <button id="mz-lbl" title="reset zoom">100%</button>
    <button id="mz-in" title="zoom in" aria-label="zoom in">+</button>
  </div>
  <div id="geomap"></div>
  <div id="geoctl"></div>
  <footer id="legend"></footer>
  <aside id="panel"></aside>
  <script src="vendor/leaflet/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
